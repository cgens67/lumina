name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'zulu'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Generate Gradle Wrapper
      run: gradle wrapper

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-configuration-cache --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Lumina-Release-APK
        path: app/build/outputs/apk/release/*.apk
        retention-days: 7

    - name: Upload Error Logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: Build-Errors
        path: '**/build/reports/'
        retention-days: 3
